name: Release Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dynamically find and read ALL files
      - name: Read all files
        run: |
          echo "=== All files found in repo ==="
          find . -type f -not -path './.git/*' -not -path './.github/*'

          echo "=== Reading each file ==="
          find . -type f -not -path './.git/*' -not -path './.github/*' | while read file; do
            echo "--- $file ---"
            cat "$file"
            echo ""
          done

      # Copy all files into a staging folder first
      - name: Stage files for upload
        run: |
          mkdir -p staging
          find . -type f \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './staging/*' \
            | while read file; do
              echo "Staging: $file"
              cp --parents "$file" staging/
            done

          echo "=== Staged files ==="
          find staging/ -type f

      # Upload the staging folder (guaranteed to exist)
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: staging/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release/

      # Dynamically read everything that was downloaded
      - name: Read all downloaded artifacts
        run: |
          echo "=== All downloaded files ==="
          find release/ -type f

          echo "=== Reading each file ==="
          find release/ -type f | while read file; do
            echo "--- $file ---"
            cat "$file"
            echo ""
          done

      # Show summary
      - name: Release summary
        run: |
          echo "=== Release Summary ==="
          echo "Branch:        ${{ github.ref_name }}"
          echo "Commit:        ${{ github.sha }}"
          echo "Triggered by:  ${{ github.actor }}"
          echo "Total files released:"
          find release/ -type f | wc -l
