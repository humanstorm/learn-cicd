name: Release Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dynamically find and read ALL files
      - name: Read all files
        run: |
          echo "=== All files found in repo ==="
          find . -type f -not -path './.git/*'

          echo "=== Reading each file ==="
          find . -type f -not -path './.git/*' | while read file; do
            echo "--- $file ---"
            cat "$file"
            echo ""
          done

      # Upload everything dynamically
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            **/*.txt
            **/*.csv
            **/*.json
            **/*.sql
          if-no-files-found: warn

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release/

      # Dynamically read everything that was downloaded
      - name: Read all downloaded artifacts
        run: |
          echo "=== All downloaded files ==="
          find release/ -type f

          echo "=== Reading each file ==="
          find release/ -type f | while read file; do
            echo "--- $file ---"
            cat "$file"
            echo ""
          done

      # Show summary of what was released
      - name: Release summary
        run: |
          echo "=== Release Summary ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Total files released:"
          find release/ -type f | wc -l
