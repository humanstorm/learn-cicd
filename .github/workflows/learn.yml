name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  learn-steps:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - print a message
      - name: Say Hello
        run: echo "Hello Data Engineer!"

      # Step 2 - print variables
      - name: Print Variables
        run: |
          echo "Repo name: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"

      # Step 3 - check environment
      - name: Check Environment
        run: |
          echo "Current directory: $(pwd)"
          echo "Current user: $(whoami)"
          echo "Today's date: $(date)"

      # Step 4 - create a file
      - name: Create a File
        run: |
          mkdir output
          echo "Hello from pipeline" > output/result.txt
          cat output/result.txt

      # Step 5 - list all files
      - name: List Files
        run: |
          echo "=== All files ==="
          find . -type f

  learn-conditions:
    runs-on: ubuntu-latest
    needs: learn-steps

    steps:
      # Step 6 - only runs if previous job passed
      - name: Previous job passed
        run: echo "learn-steps succeeded so I ran!"

      # Step 7 - always runs no matter what
      - name: Always runs
        if: always()
        run: echo "I always run no matter what!"

  learn-artifacts:
    runs-on: ubuntu-latest
    needs: learn-conditions

    steps:
      # Step 8 - create an artifact
      - name: Create Artifact
        run: |
          mkdir output
          echo "This is my artifact" > output/data.txt
          echo "Created by: ${{ github.actor }}" >> output/data.txt

      # Step 9 - list artifact before upload
      - name: List Artifacts Before Upload
        run: |
          echo "=== Files to be uploaded ==="
          find output -type f
          echo "=== File contents ==="
          cat output/data.txt

      # Step 10 - upload the artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-first-artifact
          path: output/

  download-artifact:
    runs-on: ubuntu-latest
    needs: learn-artifacts

    steps:
      # Step 11 - download artifact from previous job
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-first-artifact
          path: downloaded/

      # Step 12 - verify what was downloaded
      - name: Verify Downloaded Artifact
        run: |
          echo "=== Downloaded files ==="
          find downloaded -type f
          echo "=== File contents ==="
          cat downloaded/data.txt
